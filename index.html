<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#000000" />
<title>Laser Killer AR</title>
<style>
  /* =========================================================
     GLOBAL RESET & BASE
     ========================================================= */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    color: #e6f7ff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    touch-action: none;
    overscroll-behavior: none;
    position: fixed; /* prevent iOS bounce */
    inset: 0;
  }

  /* =========================================================
     SAFE AREA VARIABLES (computed via JS for broader support)
     ========================================================= */
  :root {
    --sat: 0px;  /* safe-area-inset-top */
    --sab: 0px;  /* safe-area-inset-bottom */
    --sal: 0px;  /* safe-area-inset-left */
    --sar: 0px;  /* safe-area-inset-right */
  }

  /* =========================================================
     CAMERA FEED (BACKGROUND)
     ========================================================= */
  #cameraVideo {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    background: radial-gradient(circle at 50% 40%, #0a1a2a 0%, #000 70%);
    z-index: 0;
  }
  #gameCanvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
    touch-action: none;
  }

  /* =========================================================
     FLASH / SHAKE / DAMAGE OVERLAYS
     ========================================================= */
  #flashOverlay {
    position: fixed; inset: 0;
    background: #fff; opacity: 0;
    pointer-events: none;
    z-index: 3;
    mix-blend-mode: screen;
    will-change: opacity;
  }
  #damageOverlay {
    position: fixed; inset: 0;
    background: radial-gradient(circle, transparent 40%, rgba(255,0,60,0.7) 100%);
    opacity: 0;
    pointer-events: none;
    z-index: 3;
    will-change: opacity;
  }
  .shake { animation: shake 0.28s linear; }
  @keyframes shake {
    0%, 100% { transform: translate3d(0,0,0); }
    15% { transform: translate3d(-7px, 4px, 0); }
    30% { transform: translate3d(6px, -5px, 0); }
    45% { transform: translate3d(-5px, -3px, 0); }
    60% { transform: translate3d(5px, 4px, 0); }
    75% { transform: translate3d(-3px, 2px, 0); }
  }

  /* =========================================================
     HUD (NEON)
     ========================================================= */
  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 4;
    padding: calc(8px + var(--sat)) calc(8px + var(--sar)) calc(8px + var(--sab)) calc(8px + var(--sal));
  }
  .hud-panel {
    pointer-events: auto;
    background: rgba(5, 10, 25, 0.55);
    border: 1px solid rgba(0, 220, 255, 0.6);
    box-shadow: 0 0 12px rgba(0, 220, 255, 0.35), inset 0 0 10px rgba(0, 220, 255, 0.15);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #baf5ff;
    font-family: 'Consolas', 'Courier New', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Top bar */
  #topBar {
    position: absolute; top: 8px; left: 8px; right: 8px;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .stat-group {
    display: grid;
    grid-template-columns: repeat(4, auto);
    gap: 5px;
    flex: 1;
    min-width: 0;
  }
  .stat {
    padding: 6px 10px;
    min-width: 0;
    text-align: center;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .stat .label {
    font-size: 8px;
    color: #5ad7ff;
    opacity: 0.85;
    display: block;
    margin-bottom: 2px;
    letter-spacing: 1.5px;
  }
  .stat .value {
    font-size: 15px;
    font-weight: bold;
    color: #e6f7ff;
    text-shadow: 0 0 6px #00e0ff, 0 0 12px #00e0ff;
    display: inline-block;
    transition: transform 0.15s ease;
  }
  .stat .value.pop { transform: scale(1.3); }
  .stat.health .value { color: #ff4d6d; text-shadow: 0 0 6px #ff4d6d, 0 0 12px #ff4d6d; }
  .stat.score .value { color: #ffe94d; text-shadow: 0 0 6px #ffe94d, 0 0 12px #ffe94d; }
  .stat.level .value { color: #c77dff; text-shadow: 0 0 6px #c77dff, 0 0 12px #c77dff; }
  .stat.timer .value { color: #00ffae; text-shadow: 0 0 6px #00ffae, 0 0 12px #00ffae; }

  /* Health bar */
  .health-bar {
    margin-top: 4px;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .health-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff4d6d, #ff8fa3);
    box-shadow: 0 0 8px #ff4d6d;
    width: 100%;
    transition: width 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    will-change: width;
  }

  /* Control buttons */
  #controlBar {
    display: flex; gap: 5px;
    flex-shrink: 0;
  }
  .ctrl-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
    color: #e6f7ff;
    flex-shrink: 0;
  }
  .ctrl-btn:active { transform: scale(0.9); box-shadow: 0 0 18px rgba(0, 220, 255, 0.9); background: rgba(0, 220, 255, 0.15); }

  /* Volume slider */
  #volumeWrap {
    position: absolute;
    bottom: 8px; left: 50%;
    transform: translateX(-50%);
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
    pointer-events: auto;
  }
  #volumeSlider {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 3px;
    background: rgba(0, 220, 255, 0.3);
    border-radius: 2px;
    outline: none;
  }
  #volumeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #00e0ff;
    box-shadow: 0 0 8px #00e0ff;
    cursor: pointer;
  }
  #volumeSlider::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #00e0ff;
    box-shadow: 0 0 8px #00e0ff;
    cursor: pointer;
    border: none;
  }
  #muteBtn {
    cursor: pointer;
    color: #e6f7ff;
    font-size: 16px;
  }

  /* Bottom info */
  #bottomInfo {
    position: absolute; bottom: 48px; left: 10px; right: 10px;
    display: flex; justify-content: space-between; align-items: flex-end;
    pointer-events: none;
    font-family: 'Consolas', monospace;
    font-size: 9px;
    color: #5ad7ff;
    text-shadow: 0 0 4px #00e0ff;
    opacity: 0.75;
    letter-spacing: 1px;
  }
  #bottomInfo .fps { color: #00ffae; }

  /* =========================================================
     START SCREEN
     ========================================================= */
  #startScreen {
    position: fixed; inset: 0;
    z-index: 10;
    background: radial-gradient(ellipse at center, #0a1a3a 0%, #000 80%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    text-align: center;
    overflow-y: auto;
  }
  #startScreen h1 {
    font-family: 'Consolas', monospace;
    font-size: clamp(32px, 8vw, 64px);
    letter-spacing: 4px;
    color: #e6f7ff;
    text-shadow:
      0 0 10px #00e0ff,
      0 0 20px #00e0ff,
      0 0 40px #c77dff,
      0 0 60px #c77dff;
    margin-bottom: 8px;
    animation: titlePulse 2.5s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 10px #00e0ff, 0 0 20px #00e0ff, 0 0 40px #c77dff; }
    50% { text-shadow: 0 0 14px #00e0ff, 0 0 30px #00e0ff, 0 0 60px #c77dff, 0 0 80px #c77dff; }
  }
  #startScreen .subtitle {
    font-family: 'Consolas', monospace;
    font-size: clamp(10px, 2.5vw, 14px);
    color: #5ad7ff;
    letter-spacing: 3px;
    margin-bottom: 40px;
    text-transform: uppercase;
  }
  #startBtn {
    padding: 16px 48px;
    font-family: 'Consolas', monospace;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #e6f7ff;
    background: transparent;
    border: 2px solid #00e0ff;
    border-radius: 4px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 0 20px rgba(0, 220, 255, 0.5), inset 0 0 20px rgba(0, 220, 255, 0.2);
  }
  #startBtn:hover, #startBtn:active {
    background: rgba(0, 220, 255, 0.15);
    box-shadow: 0 0 30px rgba(0, 220, 255, 0.9), inset 0 0 25px rgba(0, 220, 255, 0.3);
    transform: scale(1.05);
  }
  #startBtn::before {
    content: '';
    position: absolute; top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 220, 255, 0.4), transparent);
    animation: scanline 2s linear infinite;
  }
  @keyframes scanline {
    0% { left: -100%; }
    100% { left: 100%; }
  }
  .instructions {
    margin-top: 40px;
    max-width: 480px;
    font-size: 12px;
    line-height: 1.8;
    color: #8fc7d9;
    letter-spacing: 1px;
  }
  .instructions b { color: #ffe94d; }

  /* =========================================================
     MODAL (Error / Pause / Game Over)
     ========================================================= */
  .modal {
    position: fixed; inset: 0;
    z-index: 20;
    background: rgba(0, 0, 0, 0.85);
    display: none;
    align-items: center; justify-content: center;
    padding: 20px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .modal.active { display: flex; opacity: 1; }
  .modal-box {
    background: rgba(10, 20, 40, 0.92);
    border: 1px solid #00e0ff;
    box-shadow: 0 0 30px rgba(0, 220, 255, 0.5);
    padding: 28px 32px;
    border-radius: 6px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    transform: scale(0.9);
    transition: transform 0.25s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .modal.active .modal-box { transform: scale(1); }
  .modal-box h2 {
    font-family: 'Consolas', monospace;
    font-size: 22px;
    color: #e6f7ff;
    text-shadow: 0 0 10px #00e0ff;
    margin-bottom: 14px;
    letter-spacing: 3px;
  }
  .modal-box p {
    color: #baf5ff;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 18px;
    white-space: pre-line;
  }
  .modal-stats {
    display: flex; justify-content: center; gap: 16px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .modal-stat {
    padding: 8px 14px;
    border: 1px solid rgba(0, 220, 255, 0.4);
    border-radius: 4px;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    color: #baf5ff;
  }
  .modal-stat .v {
    display: block;
    font-size: 18px;
    color: #ffe94d;
    text-shadow: 0 0 8px #ffe94d;
    margin-top: 2px;
  }
  .modal-btn {
    padding: 11px 24px;
    margin: 5px;
    font-family: 'Consolas', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #e6f7ff;
    background: transparent;
    border: 1px solid #00e0ff;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .modal-btn:hover, .modal-btn:active {
    background: rgba(0, 220, 255, 0.2);
    box-shadow: 0 0 15px rgba(0, 220, 255, 0.7);
  }
  .modal-btn.danger { border-color: #ff4d6d; color: #ffb3c1; }
  .modal-btn.danger:hover { background: rgba(255, 77, 109, 0.2); box-shadow: 0 0 15px rgba(255, 77, 109, 0.7); }

  /* =========================================================
     LOADING INDICATOR
     ========================================================= */
  #loadingOverlay {
    position: fixed; inset: 0;
    z-index: 15;
    background: rgba(0, 0, 0, 0.92);
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  #loadingOverlay.active { display: flex; opacity: 1; }
  .spinner {
    width: 60px; height: 60px;
    border: 3px solid rgba(0, 220, 255, 0.2);
    border-top-color: #00e0ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    box-shadow: 0 0 20px rgba(0, 220, 255, 0.5);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingOverlay p {
    margin-top: 20px;
    font-family: 'Consolas', monospace;
    color: #5ad7ff;
    letter-spacing: 2px;
    font-size: 12px;
  }

  /* =========================================================
     RESPONSIVE
     ========================================================= */
  @media (max-width: 420px) {
    .stat { padding: 5px 7px; }
    .stat .value { font-size: 12px; }
    .stat .label { font-size: 7px; }
    .ctrl-btn { width: 34px; height: 34px; font-size: 14px; }
    #volumeSlider { width: 70px; }
    #volumeWrap { padding: 5px 10px; font-size: 12px; }
  }
  @media (max-height: 500px) and (orientation: landscape) {
    #startScreen h1 { font-size: 32px; }
    .instructions { display: none; }
    #startScreen .subtitle { margin-bottom: 16px; }
  }
  @media (min-width: 1024px) {
    .stat { padding: 8px 14px; }
    .stat .value { font-size: 18px; }
    .ctrl-btn { width: 44px; height: 44px; font-size: 18px; }
  }
</style>
</head>
<body>

  <!-- =========================================================
       CAMERA FEED (BACKGROUND)
       ========================================================= -->
  <video id="cameraVideo" autoplay playsinline muted preload="auto"></video>

  <!-- =========================================================
       GAME CANVAS
       ========================================================= -->
  <canvas id="gameCanvas"></canvas>

  <!-- =========================================================
       OVERLAYS
       ========================================================= -->
  <div id="flashOverlay"></div>
  <div id="damageOverlay"></div>

  <!-- =========================================================
       HUD
       ========================================================= -->
  <div id="hud">
    <div id="topBar">
      <div class="stat-group">
        <div class="stat health hud-panel">
          <span class="label">Health</span>
          <span class="value" id="healthValue">100</span>
          <div class="health-bar"><div class="health-bar-fill" id="healthBar"></div></div>
        </div>
        <div class="stat score hud-panel">
          <span class="label">Score</span>
          <span class="value" id="scoreValue">0</span>
        </div>
        <div class="stat level hud-panel">
          <span class="label">Level</span>
          <span class="value" id="levelValue">1</span>
        </div>
        <div class="stat timer hud-panel">
          <span class="label">Timer</span>
          <span class="value" id="timerValue">00:00</span>
        </div>
      </div>
      <div id="controlBar">
        <div class="ctrl-btn hud-panel" id="pauseBtn" title="Pause">⏸</div>
        <div class="ctrl-btn hud-panel" id="restartBtn" title="Restart">↻</div>
        <div class="ctrl-btn hud-panel" id="fullscreenBtn" title="Fullscreen">⛶</div>
      </div>
    </div>
    <div id="volumeWrap" class="hud-panel">
      <span id="muteBtn">🔊</span>
      <input id="volumeSlider" type="range" min="0" max="100" value="40" />
    </div>
    <div id="bottomInfo">
      <div>LASER KILLER AR v1.0</div>
      <div class="fps" id="fpsDisplay">60 FPS</div>
    </div>
  </div>

  <!-- =========================================================
       START SCREEN
       ========================================================= -->
  <div id="startScreen">
    <h1>LASER KILLER</h1>
    <div class="subtitle">▸ AUGMENTED REALITY COMBAT ◂</div>
    <button id="startBtn">START GAME</button>
    <div class="instructions">
      <p><b>TAP</b> anywhere to shoot enemy drones.</p>
      <p>Avoid <b>laser beams</b> — they drain your health.</p>
      <p>Survive waves, level up, dominate the arena.</p>
    </div>
  </div>

  <!-- =========================================================
       LOADING OVERLAY
       ========================================================= -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p>INITIALIZING SYSTEMS...</p>
  </div>

  <!-- =========================================================
       GENERIC MODAL
       ========================================================= -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <h2 id="modalTitle">TITLE</h2>
      <p id="modalMessage">Message</p>
      <div id="modalStats" class="modal-stats"></div>
      <div id="modalButtons"></div>
    </div>
  </div>

<script>
/* ================================================================
   LASER KILLER AR — Production Build
   Single-file Futuristic AR Shooter
   Architecture: modular classes, object pooling, optimized for 60FPS
   Ready for: multiplayer, AI enemies, cloud save, voice commands,
              motion detection, CCTV mode, weapon upgrades, bosses.
   ================================================================ */

/* ----------------------------------------------------------------
   UTIL: Object Pool — reduces GC pressure
   ---------------------------------------------------------------- */
class Pool {
  constructor(factory, reset, initialSize = 32) {
    this.factory = factory;
    this.reset = reset;
    this.pool = [];
    this.active = [];
    for (let i = 0; i < initialSize; i++) this.pool.push(factory());
  }
  acquire() {
    const obj = this.pool.length > 0 ? this.pool.pop() : this.factory();
    this.active.push(obj);
    return obj;
  }
  release(obj) {
    const idx = this.active.indexOf(obj);
    if (idx >= 0) {
      this.active.splice(idx, 1);
      this.reset(obj);
      this.pool.push(obj);
    }
  }
  releaseAll() {
    while (this.active.length > 0) {
      const obj = this.active.pop();
      this.reset(obj);
      this.pool.push(obj);
    }
  }
  /** Iterate active without allocating */
  forEach(fn) {
    // Iterate by index; items may be released during iteration — safe because
    // release() splices, so we iterate backwards or copy length.
    for (let i = this.active.length - 1; i >= 0; i--) {
      fn(this.active[i], i);
    }
  }
  get count() { return this.active.length; }
}

/* ----------------------------------------------------------------
   1. AUDIO MANAGER — Web Audio API with pooling + volume control
   ---------------------------------------------------------------- */
class AudioManager {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.volume = 0.4;
    this.muted = false;
    this.enabled = true;
    this._lastShoot = 0;
    this._lastHit = 0;
    this._lastExplosion = 0;
  }
  init() {
    if (this.ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { this.enabled = false; return; }
      this.ctx = new AC();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = this.muted ? 0 : this.volume;
      this.masterGain.connect(this.ctx.destination);
    } catch (e) {
      console.warn('AudioManager init failed:', e);
      this.enabled = false;
    }
  }
  resume() {
    if (this.ctx && this.ctx.state === 'suspended') {
      const p = this.ctx.resume();
      if (p && p.catch) p.catch(() => {});
    }
  }
  setVolume(v) {
    this.volume = Math.max(0, Math.min(1, v));
    if (this.masterGain) {
      this.masterGain.gain.setTargetAtTime(
        this.muted ? 0 : this.volume, this.ctx.currentTime, 0.02
